server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN.example.com;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.example.com/privkey.pem;

    server_tokens off;
    root /var/www/honeypot;
    index index.html;

    access_log /var/log/nginx/honeypot_access.log;
    error_log  /var/log/nginx/honeypot_error.log warn;

    client_max_body_size 1M;
    client_body_timeout 10s;
    client_header_timeout 10s;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}

